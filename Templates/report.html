<!DOCTYPE html>
<html>
<head>
<title>Attendance Sheet</title>

<style>

body{
font-family: Arial;
margin:40px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse: collapse;
margin-top:20px;
}

th, td{
border:1px solid black;
padding:8px;
text-align:left;
}

th{
background:#f2f2f2;
}

.print-btn{
margin-top:20px;
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<h1>KABARAK UNIVERSITY</h1>

<h3>Unit: INTE 111 – Introduction to Information Technology</h3>

<button class="print-btn" onclick="window.print()">Print Attendance</button>

<table>

<tr>
<th>No</th>
<th>Name</th>
<th>Session</th>
<th>Date & Time</th>
</tr>

{% for row in records %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ row["name"] }}</td>
<td>{{ row["session_id"] }}</td>
<td>{{ row["marked_at"] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
