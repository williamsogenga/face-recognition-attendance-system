<!DOCTYPE html>
<html>
<head>
    <title>Login - Attendance System</title>

    <style>

        body{
            margin:0;
            font-family: Arial;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:350px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            background:#2a5298;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1e3c72;
        }

    </style>

</head>

<body>

<div class="login-box">

<h2>Lecturer Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
