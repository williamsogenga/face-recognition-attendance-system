<!DOCTYPE html>
<html>

<head>

<title>Attendance Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.card{
border:none;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Face Recognition Attendance Dashboard</h2>

<div class="row mb-4">

<div class="col-md-4">
<div class="card shadow p-3">
<h5>Total Records</h5>
<h2>{{ total }}</h2>
</div>
</div>

<div class="col-md-4">
<a href="/download" class="btn btn-success mt-4">
Download Excel Report
</a>
</div>

</div>

<div class="card shadow p-3">

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>Session</th>
<th>Name</th>
<th>Time</th>
</tr>

</thead>

<tbody>

{% for row in records %}

<tr>

<td>{{ row.attendance_id }}</td>
<td>{{ row.session_id }}</td>
<td>{{ row.name }}</td>
<td>{{ row.marked_at }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
